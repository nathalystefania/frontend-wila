<div class="flex">

  <!-- Columna izquierda: tu stepper/sidebar visual -->
  <div class="w-1/3">
    <mat-vertical-stepper #stepper [selectedIndex]="currentStep" [linear]="true" (selectionChange)="onStepChange($event)">
      <mat-step label="Creación de cuenta" [completed]="isAuthStepCompleted" [editable]="isAuthStepCompleted">
        <ng-template matStepperIcon="done">
          <mat-icon>check</mat-icon>
        </ng-template>
      </mat-step>
      
      <mat-step label="Definición de la planta" [completed]="isPlantaStepCompleted" [editable]="isPlantaStepCompleted">
        <ng-template matStepperIcon="done">
          <mat-icon>check</mat-icon>
        </ng-template>
      </mat-step>
      
      <mat-step label="Configuración de motores" [completed]="isMotoresStepCompleted" [editable]="isMotoresStepCompleted">
        <ng-template matStepperIcon="done">
          <mat-icon>check</mat-icon>
        </ng-template>
      </mat-step>
      
      <mat-step label="Revisión" [editable]="isMotoresStepCompleted">
        <ng-template matStepperIcon="done">
          <mat-icon>check</mat-icon>
        </ng-template>
      </mat-step>
      
      <mat-step label="Asignación dispositivos" [editable]="false">
        <ng-template matStepperIcon="done">
          <mat-icon>check</mat-icon>
        </ng-template>
      </mat-step>
      
      <mat-step label="Confirmación" [editable]="false">
        <ng-template matStepperIcon="done">
          <mat-icon>check</mat-icon>
        </ng-template>
      </mat-step>
    </mat-vertical-stepper>
  </div>

  <!-- Columna derecha: contenido -->
  <div class="w-2/3">

    <ng-container [ngSwitch]="currentStep">
      <app-auth-step *ngSwitchCase="0"></app-auth-step>
      <app-planta-step *ngSwitchCase="1"></app-planta-step>
      <app-motores-step *ngSwitchCase="2"></app-motores-step>
      <!-- pasos 4,5,6 después -->
    </ng-container>

    <div style="margin-top: 24px; display:flex; gap: 12px;">
      <button type="button" (click)="back()" [disabled]="currentStep === 0">
        Volver
      </button>

      <button type="button" (click)="nextClicked()" [disabled]="loadingNext">
        {{ loadingNext ? 'Guardando...' : 'Siguiente' }}
      </button>
    </div>

    <div *ngIf="nextError" style="color:red; margin-top:12px;">
      {{ nextError }}
    </div>

  </div>
</div>
